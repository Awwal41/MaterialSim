# See https://joss.readthedocs.io/en/latest/paper.html#checking-that-your-paper-compiles
name: Draft PDF

on:
  push:
    paths:
      - paper.md
      - paper.bib
      - .github/workflows/draft-pdf.yml
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper draft PDF
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper.md
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper.pdf
